<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETZ CHAIM — 塔羅抽牌</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --gold-dim: #7a6030;
    --ink: #0a0804;
    --parchment: #f5ead8;
    --parchment-dark: #e8d5b5;
    --crimson: #8b1a1a;
    --deep-teal: #1a3a3a;
    --silver: #c0bdb0;
    --glow: rgba(201,168,76,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080604;
    color: var(--parchment);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield background */
  .starfield {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(26,58,58,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(80,40,10,0.3) 0%, transparent 50%),
      #080604;
    z-index: 0;
  }
  .starfield::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 10%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 25%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 50%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(201,168,76,0.5) 0%, transparent 100%);
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .sigil {
    width: 80px;
    height: 80px;
    margin: 0 auto 16px;
    opacity: 0.9;
    animation: rotate-slow 30s linear infinite;
  }

  @keyframes rotate-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(201,168,76,0.2);
    margin-bottom: 8px;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--silver);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 20px auto;
    opacity: 0.5;
  }

  /* Mode selector */
  .mode-selector {
    display: flex;
    gap: 20px;
    margin-bottom: 48px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    position: relative;
    padding: 18px 36px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--silver);
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.4s ease;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  .mode-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .mode-btn:hover, .mode-btn.active {
    border-color: var(--gold);
    color: var(--gold-light);
    text-shadow: 0 0 20px var(--glow);
    box-shadow: 0 0 20px rgba(201,168,76,0.15), inset 0 0 20px rgba(201,168,76,0.05);
  }

  .mode-btn:hover::before, .mode-btn.active::before {
    opacity: 1;
  }

  .mode-btn.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .mode-icon {
    display: block;
    font-size: 1.6rem;
    margin-bottom: 6px;
  }

  /* Draw area */
  .draw-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .mode-description {
    text-align: center;
    font-size: 0.82rem;
    color: var(--silver);
    opacity: 0.7;
    letter-spacing: 0.1em;
    font-family: 'Cinzel', serif;
    max-width: 400px;
  }

  /* Draw button */
  .draw-btn {
    position: relative;
    padding: 20px 60px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.05rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    transition: all 0.3s ease;
    overflow: visible;
  }

  .draw-btn::before, .draw-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid var(--gold);
    transition: all 0.4s ease;
  }
  .draw-btn::before {
    clip-path: polygon(20px 0%, 100% 0%, calc(100% - 20px) 100%, 0% 100%);
    background: rgba(201,168,76,0.06);
  }
  .draw-btn::after {
    clip-path: polygon(20px 0%, 100% 0%, calc(100% - 20px) 100%, 0% 100%);
    border: 1px solid transparent;
    box-shadow: 0 0 0 0 var(--glow);
  }

  .draw-btn:hover::before {
    background: rgba(201,168,76,0.14);
    box-shadow: 0 0 40px rgba(201,168,76,0.25);
  }

  .draw-btn:hover {
    text-shadow: 0 0 20px var(--glow);
    transform: translateY(-2px);
  }

  .draw-btn:active {
    transform: translateY(0);
  }

  /* Result display */
  .result-area {
    width: 100%;
    max-width: 680px;
    display: none;
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-display {
    position: relative;
    background: linear-gradient(135deg, #120e08, #1a1408, #0e0c06);
    border: 1px solid var(--gold-dim);
    padding: 40px 40px 36px;
    text-align: center;
  }

  .card-display::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,168,76,0.15);
    pointer-events: none;
  }

  .card-display::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .card-number-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--gold-dim);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .card-name-zh {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--gold-light);
    text-shadow: 0 0 30px var(--glow);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-name-en {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold-dim);
    letter-spacing: 0.25em;
    margin-bottom: 20px;
  }

  .card-symbol {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 12px var(--glow));
  }

  .card-suit-badge {
    display: inline-block;
    padding: 4px 16px;
    border: 1px solid var(--gold-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--silver);
    letter-spacing: 0.3em;
    margin-bottom: 24px;
    background: rgba(201,168,76,0.04);
  }

  .divider-ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider-ornament .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim));
  }
  .divider-ornament .line.right {
    background: linear-gradient(to left, transparent, var(--gold-dim));
  }
  .divider-ornament .diamond {
    width: 6px;
    height: 6px;
    background: var(--gold-dim);
    transform: rotate(45deg);
  }

  .card-essence-title {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    color: var(--gold-dim);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .card-essence {
    font-size: 1rem;
    color: var(--parchment);
    line-height: 1.7;
    margin-bottom: 16px;
    font-weight: 300;
  }

  .card-meaning {
    font-size: 0.88rem;
    color: var(--silver);
    line-height: 1.85;
    font-weight: 300;
    text-align: left;
    opacity: 0.85;
    border-left: 2px solid var(--gold-dim);
    padding-left: 16px;
    margin-top: 4px;
  }

  .astro-tag {
    display: inline-block;
    margin-top: 20px;
    padding: 5px 14px;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--gold-dim);
    letter-spacing: 0.25em;
  }

  .negative-section {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(139,26,26,0.08);
    border: 1px solid rgba(139,26,26,0.25);
    border-left: 3px solid var(--crimson);
  }
  .negative-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: #c07070;
    letter-spacing: 0.3em;
    margin-bottom: 6px;
  }
  .negative-text {
    font-size: 0.82rem;
    color: #d0a0a0;
    line-height: 1.6;
  }

  .kabbalah-tag {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 12px;
    background: rgba(26,58,58,0.3);
    border: 1px solid rgba(100,160,160,0.2);
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    color: #90c0c0;
    letter-spacing: 0.2em;
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold-dim);
    border-style: solid;
    border-width: 0;
  }
  .corner.tl { top: 10px; left: 10px; border-top-width: 1px; border-left-width: 1px; }
  .corner.tr { top: 10px; right: 10px; border-top-width: 1px; border-right-width: 1px; }
  .corner.bl { bottom: 10px; left: 10px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner.br { bottom: 10px; right: 10px; border-bottom-width: 1px; border-right-width: 1px; }

  /* History */
  .history-section {
    width: 100%;
    max-width: 680px;
    margin-top: 20px;
  }

  .history-header {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--gold-dim);
    letter-spacing: 0.4em;
    text-align: center;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .history-chip {
    padding: 4px 12px;
    border: 1px solid rgba(201,168,76,0.2);
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    color: var(--gold-dim);
    letter-spacing: 0.15em;
    background: rgba(201,168,76,0.04);
  }

  .again-btn {
    margin-top: 24px;
    padding: 12px 32px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s ease;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .again-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  /* Shuffle animation */
  @keyframes cardFlip {
    0% { transform: perspective(600px) rotateY(0deg) scale(1); opacity: 1; }
    50% { transform: perspective(600px) rotateY(90deg) scale(0.9); opacity: 0.5; }
    100% { transform: perspective(600px) rotateY(0deg) scale(1); opacity: 1; }
  }

  .card-display.flipping {
    animation: cardFlip 0.6s ease;
  }
</style>
</head>
<body>

<div class="starfield"></div>

<div class="container">
  <div class="header">
    <svg class="sigil" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
      <circle cx="50" cy="50" r="38" fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.3"/>
      <!-- Star of David -->
      <polygon points="50,8 62,30 38,30" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>
      <polygon points="50,92 62,70 38,70" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>
      <polygon points="8,50 30,38 30,62" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>
      <polygon points="92,50 70,38 70,62" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>
      <circle cx="50" cy="50" r="6" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.8"/>
      <!-- Tree of life nodes suggestion -->
      <circle cx="50" cy="20" r="2.5" fill="#c9a84c" opacity="0.6"/>
      <circle cx="50" cy="80" r="2.5" fill="#c9a84c" opacity="0.6"/>
      <circle cx="25" cy="38" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="75" cy="38" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="25" cy="62" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="75" cy="62" r="2" fill="#c9a84c" opacity="0.5"/>
      <circle cx="50" cy="50" r="2" fill="#c9a84c" opacity="0.8"/>
    </svg>

    <h1 class="title">ETZ CHAIM</h1>
    <p class="subtitle">生命之樹　塔羅抽牌系統</p>
    <div class="divider"></div>
  </div>

  <!-- Mode selection -->
  <div class="mode-selector">
    <button class="mode-btn active" onclick="setMode('major')" id="btn-major">
      <span class="mode-icon">☽</span>
      大秘儀
    </button>
    <button class="mode-btn" onclick="setMode('minor')" id="btn-minor">
      <span class="mode-icon">✦</span>
      小秘儀
    </button>
  </div>

  <div class="draw-area">
    <p class="mode-description" id="mode-desc">22張大秘儀牌，揭示靈魂深處的原型力量與命運法則</p>

    <button class="draw-btn" onclick="drawCard()">
      抽　牌
    </button>

    <div class="result-area" id="result-area">
      <div class="card-display" id="card-display">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div id="card-content"></div>
      </div>
      <button class="again-btn" onclick="drawCard()">▸ 再抽一張</button>
    </div>

    <div class="history-section" id="history-section" style="display:none">
      <p class="history-header">⟡ 本次已抽牌記錄 ⟡</p>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>
</div>

<script>
// ========================
// MAJOR ARCANA DATA
// ========================
const majorArcana = [
  { num: "0", zh: "愚者", en: "The Fool", symbol: "🌬", essence: "純粹的起點，無畏的躍入未知，天真的出發。", meaning: "象徵靈魂在物質世界的出發點。無條件的信任，在懸崖邊縱身一躍——並非無知，而是全然的信任存在。", kabbalah: "Aleph — 風" },
  { num: "I", zh: "魔法師", en: "The Magician", symbol: "☿", essence: "意志的彰顯，將高處之物帶入低處。", meaning: "四種元素俱備，意志集中於一點。「天上如此，地下亦然」——橋接神聖意志與物質行動的施作者。", kabbalah: "Beth — 水星" },
  { num: "II", zh: "女祭司", en: "The High Priestess", symbol: "☽", essence: "隱藏的知識，月亮的神秘，未顯化的潛能。", meaning: "她守護著薄紗後方的奧秘。直覺、潛意識、週期性的智慧。不說話，只存在——那便是她的力量。", kabbalah: "Gimel — 月亮" },
  { num: "III", zh: "女皇", en: "The Empress", symbol: "♀", essence: "豐盛的創造力，生命力，感官的歡愉。", meaning: "大地母親，所有有形之物的賦形者。她的懷孕既是字面的也是比喻的——一切美麗與豐饒皆源自她。", kabbalah: "Daleth — 金星" },
  { num: "IV", zh: "皇帝", en: "The Emperor", symbol: "♈", essence: "秩序、結構、父性權威。", meaning: "建立法律與界限的人。他的力量來自於清晰的意志與鐵一般的原則。混亂的對立面，也是創造的基礎。", kabbalah: "Heh — 白羊座" },
  { num: "V", zh: "教皇", en: "The Hierophant", symbol: "♉", essence: "傳統、制度、靈性導師。", meaning: "橋接神聖與世俗的中介者。他持有鑰匙，知道儀式的意義。也可能是束縛於教條的囚徒。", kabbalah: "Vau — 金牛座" },
  { num: "VI", zh: "戀人", en: "The Lovers", symbol: "♊", essence: "選擇、結合、對立的和諧。", meaning: "不僅是愛情——是所有二元對立的融合時刻。每一次真正的選擇都是一次靈魂的表態。", kabbalah: "Zain — 雙子座" },
  { num: "VII", zh: "戰車", en: "The Chariot", symbol: "♋", essence: "勝利的掌控，以意志駕馭矛盾的力量。", meaning: "兩匹馬拉向不同方向，但車手以純粹意志前進。不是壓制，而是整合——帶著張力向前。", kabbalah: "Cheth — 巨蟹座" },
  { num: "VIII", zh: "力量", en: "Adjustment (Lust)", symbol: "♌", essence: "靈魂的力量，非肌肉之力；駕馭本能。", meaning: "她以溫柔開合獅子之口。真正的力量是內在的寧靜，不是征服，而是與野性共舞。", kabbalah: "Teth — 獅子座" },
  { num: "IX", zh: "隱士", en: "The Hermit", symbol: "♍", essence: "孤獨的智慧，內在光明的尋求。", meaning: "他帶著燈籠走在黑暗山路上——既是尋道者，也是為後來者照路的人。轉向內在，才能找到真光。", kabbalah: "Yod — 處女座" },
  { num: "X", zh: "命運之輪", en: "Wheel of Fortune", symbol: "♃", essence: "循環、命運、機運的轉動。", meaning: "無常是宇宙的本質。輪子轉動，沒有人永遠在頂端或底部。了解循環，便能與命運共舞而非對抗。", kabbalah: "Kaph — 木星" },
  { num: "XI", zh: "正義", en: "Justice", symbol: "♎", essence: "平衡、因果、客觀的裁量。", meaning: "她的劍切斷幻象，天平不偏不倚。宇宙的法則自動運作，無需辯護——業力即是最後的正義。", kabbalah: "Lamed — 天秤座" },

// ========================
// STATE
// ========================
let currentMode = 'major';
let drawnHistory = [];

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-major').classList.toggle('active', mode === 'major');
  document.getElementById('btn-minor').classList.toggle('active', mode === 'minor');
  document.getElementById('mode-desc').textContent = mode === 'major'
    ? '22張大秘儀牌，揭示靈魂深處的原型力量與命運法則'
    : '56張小秘儀牌，反映日常生活的細微經驗與内在狀態';
  // Reset history if mode changes
  drawnHistory = [];
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('history-section').style.display = 'none';
}

function drawCard() {
  const deck = currentMode === 'major' ? majorArcana : minorArcana;
  const card = deck[Math.floor(Math.random() * deck.length)];

  // Add to history
  drawnHistory.unshift(card.zh);
  if (drawnHistory.length > 10) drawnHistory.pop();

  renderCard(card);
  renderHistory();
}

function renderCard(card) {
  const resultArea = document.getElementById('result-area');
  const cardDisplay = document.getElementById('card-display');
  const content = document.getElementById('card-content');

  let html = '';

  if (currentMode === 'major') {
    html = `
      <div class="card-number-label">大秘儀 · ${card.num}</div>
      <div class="card-name-zh">${card.zh}</div>
      <div class="card-name-en">${card.en}</div>
      <span class="card-symbol">${card.symbol}</span>
      <div class="divider-ornament"><div class="line"></div><div class="diamond"></div><div class="line right"></div></div>
      <div class="card-essence-title">⟡ 核心本質</div>
      <div class="card-essence">${card.essence}</div>
      <div class="card-meaning">${card.meaning}</div>
      ${card.kabbalah ? `<div><span class="kabbalah-tag">🌳 ${card.kabbalah}</span></div>` : ''}
    `;
  } else {
    html = `
      <span class="card-suit-badge">${card.suit}</span>
      <div class="card-name-zh">${card.zh}</div>
      <div class="card-name-en">${card.en}</div>
      ${card.astro ? `<div class="card-number-label">${card.astro}</div>` : ''}
      <div class="divider-ornament"><div class="line"></div><div class="diamond"></div><div class="line right"></div></div>
      <div class="card-essence-title">⟡ 核心本質</div>
      <div class="card-essence">${card.essence}</div>
      <div class="card-meaning">${card.meaning}</div>
      ${card.kabbalah ? `<div><span class="kabbalah-tag">🌳 ${card.kabbalah}</span></div>` : ''}
      ${card.negative ? `
        <div class="negative-section">
          <div class="negative-label">▸ 負面意涵</div>
          <div class="negative-text">${card.negative}</div>
        </div>
      ` : ''}
    `;
  }

  content.innerHTML = html;
  resultArea.style.display = 'block';

  // Trigger flip animation
  cardDisplay.classList.remove('flipping');
  void cardDisplay.offsetWidth; // reflow
  cardDisplay.classList.add('flipping');
  setTimeout(() => cardDisplay.classList.remove('flipping'), 700);

  resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');

  if (drawnHistory.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = drawnHistory.map((name, i) =>
    `<span class="history-chip">${i === 0 ? '▸ ' : ''}${name}</span>`
  ).join('');
}
</script>
